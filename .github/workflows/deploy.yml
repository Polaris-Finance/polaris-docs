name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

# Shared base path / site URL inherited by every job.
env:
  BASE_PATH: /polaris-docs
  NEXT_PUBLIC_BASE_PATH: /polaris-docs
  SITE_URL: https://polaris-finance.github.io
  NEXT_PUBLIC_SITE_URL: https://polaris-finance.github.io

jobs:
  source-checks:
    name: Source checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so Nextra can read each page's last-modified git timestamp.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate source files
        run: npm run ci:source

  build:
    name: Build and artifact checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so Nextra can read each page's last-modified git timestamp.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build static site
        run: npm run build

      - name: Validate exported artifact
        run: npm run ci:artifact

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out
          include-hidden-files: true

  production-audit:
    name: Production dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm run audit:prod

  external-links:
    name: External link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check external links
        run: npm run check:links:external
        continue-on-error: true

  deploy:
    needs: [source-checks, build, production-audit]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Checkout smoke checker
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Smoke check deployed Pages site
        # page_url is GitHub's ground truth for where Pages actually serves the
        # site; asserting canonicals against it (instead of the SITE_URL that
        # generated them) catches a misconfigured SITE_URL at deploy time.
        env:
          LIVE_ARTIFACT_EXPECTED_BASE_URL: ${{ steps.deployment.outputs.page_url }}
        run: npm run check:live-artifact -- --base-url "${{ steps.deployment.outputs.page_url }}"
