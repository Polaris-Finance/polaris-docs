name: Validate docs

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /polaris-docs
      NEXT_PUBLIC_BASE_PATH: /polaris-docs
      SITE_URL: https://polaris-finance.github.io
      NEXT_PUBLIC_SITE_URL: https://polaris-finance.github.io
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Validate docs with single build artifact
        run: npm run ci

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Check external links
        run: npm run check:links:external
        continue-on-error: true
